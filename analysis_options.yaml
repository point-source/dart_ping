# Enables the `recommended` lint rule set from package:lints, the rules the
# Dart team recommends for published packages.
# See https://github.com/dart-lang/lints for the rule list and rationale.
include: package:lints/recommended.yaml

# For lint rules and documentation, see https://dart.dev/tools/linter-rules.
# Uncomment to specify additional rules.
# linter:
#   rules:
#     - camel_case_types

analyzer:
  exclude:
    - "**/*.g.dart"
    - "**/*.freezed.dart"
    # The Flutter example under example/ is its own package (its own pubspec +
    # flutter_lints analysis_options) and depends on the Flutter SDK, so it is
    # not resolvable under dart_ping's pure-Dart `dart pub get`. It is built and
    # checked by the macOS `ios-swift` CI job (flutter build), not by this
    # package's `dart analyze`.
    - "example/**"
