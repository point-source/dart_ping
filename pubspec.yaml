name: dart_ping
description: >-
  Multi-platform ICMP ping for Dart and Flutter — Windows, macOS, Linux,
  Android, and iOS — with live round-trip statistics and packet-loss summaries.
version: 10.0.0
homepage: https://github.com/point-source/dart_ping
repository: https://github.com/point-source/dart_ping
issue_tracker: https://github.com/point-source/dart_ping/issues
topics:
  - ping
  - icmp
  - network
  - networking
  - latency
  - ios

environment:
  sdk: ">=3.10.0 <4.0.0"

dependencies:
  async: ^2.4.2
  collection: ^1.16.0
  ffi: ^2.1.0
  hooks: ^2.0.2
  code_assets: ^1.2.1

dev_dependencies:
  coverage: ^1.7.0
  lints: ^6.0.0
  test: ^1.31.0
